name: Release

# Triggered when a GitHub Release is published. `published` (not `created`)
# means drafting a release in the UI does not publish prematurely. The manual
# `workflow_dispatch` button builds artifacts on demand without publishing.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-progress publish

permissions:
  contents: read

jobs:
  # Re-run the suite on the release commit. ci.yml covers main, but a release
  # can be tagged on any commit, so verify once more before touching PyPI.
  test:
    name: Sanity-test the release commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v

  # Pure-Python package: a single sdist + one py3-none-any wheel, no
  # cibuildwheel or per-platform matrix.
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: |
          twine check dist/*
          ls -l dist/
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # Publish via Trusted Publishing (OIDC) — no API token. Only runs on a real
  # release event; workflow_dispatch stops after build for inspection.
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/ccbox
    permissions:
      id-token: write # required for the OIDC token used by Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
